version: "3.5"
services:
  proposta-app:
    image: proposta-app
    ports:
      - "8080:80"
    depends_on:
        rabbit-mq:
          condition: service_healthy
  rabbit-mq:
    image: rabbitmq:3-managmement
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      timeout: 5s
      interval: 5s
      retries: 3
  db:
    image: postgres
    environment:
      POSTGRES_PASSWORD: silva007
      POSTGRES_DB: proposta
